name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.23"
  GOLANGCI_LINT_VERSION: "v1.61.0"
  CGO_ENABLED: "0"

jobs:
  tidy:
    name: go mod tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "::error::go.mod / go.sum are not tidy — run 'go mod tidy' locally and commit"
            exit 1
          fi

  fmt:
    name: gofmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt -s -l
        run: |
          out=$(gofmt -s -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt drift in the following files:"
            echo "$out"
            exit 1
          fi

  vet:
    name: go vet
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go vet ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m
          only-new-issues: false

  license-header:
    name: SPDX header check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: verify every Go file carries the SPDX header
        run: |
          missing=0
          while IFS= read -r f; do
            head -n1 "$f" | grep -q "SPDX-License-Identifier: BUSL-1.1" || {
              echo "::error file=$f::missing SPDX header"
              missing=$((missing+1))
            }
          done < <(find . -type f -name '*.go' -not -path './vendor/*' -not -path './.git/*')
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing file(s) missing SPDX header — copy from LICENSE-HEADER.txt"
            exit 1
          fi

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go test -race
        run: go test -race -count=1 -timeout=5m -coverprofile=coverage.txt -covermode=atomic ./...
      - name: upload coverage
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt
          if-no-files-found: ignore

  build:
    name: build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
    needs: [tidy, fmt, vet, lint, license-header, test]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: cross-compile
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="bin/crucible-${GOOS}-${GOARCH}${ext}"
          mkdir -p bin
          VERSION="${GITHUB_REF_NAME:-dev}"
          COMMIT="${GITHUB_SHA::12}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GO_VER="$(go version | awk '{print $3}')"
          PKG="github.com/crucible-io/crucible/internal/version"
          go build \
            -trimpath \
            -ldflags "-s -w \
              -X '${PKG}.Version=${VERSION}' \
              -X '${PKG}.Commit=${COMMIT}' \
              -X '${PKG}.BuildDate=${BUILD_DATE}' \
              -X '${PKG}.GoVersion=${GO_VER}'" \
            -o "$out" ./cmd/crucible
          ls -la "$out"
      - uses: actions/upload-artifact@v4
        with:
          name: crucible-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: bin/crucible-*
          if-no-files-found: error

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: run govulncheck
        run: govulncheck ./...
